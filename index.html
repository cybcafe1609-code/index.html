<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only4CricketFans - Premium Live Prediction</title>
    <style>
        :root {
            --stadium-blue: #0f172a;
            --neon-gold: #fbbf24;
            --pitch-green: #10b981;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--stadium-blue);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 25px;
            border: 2px solid var(--neon-gold);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--neon-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .tagline {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .timer-box {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--pitch-green);
        }

        .timer {
            color: #ef4444;
            font-weight: bold;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--neon-gold);
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .payment-info-box {
            background: #0f172a;
            border: 1px dashed var(--neon-gold);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .pay-btn-link {
            display: inline-block;
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 10px;
        }

        .qr-img {
            max-width: 180px;
            margin: 10px auto;
            display: block;
            border: 4px solid white;
            border-radius: 8px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .radio-label {
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #475569;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .radio-label:hover {
            border-color: var(--neon-gold);
            background: #1e293b;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--neon-gold), #d97706);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4);
        }

        .admin-btn {
            background: #475569;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
            width: auto;
            margin-top: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Only4CricketFans</h1>
    <div class="tagline">🎯 Premium Paid Prediction Contest</div>

    <div class="timer-box">
        <div>Contest: <span id="contest-status" style="color:var(--pitch-green); font-weight:bold;">LIVE</span></div>
        <div>Q-Timer: <span id="q-timer" class="timer">10s</span></div>
    </div>

    <form id="predictionForm">
        <div id="section1" class="section active">
            <h3 style="color:var(--pitch-green)">Section 1: Entry & Payment Info</h3>
            
            <div class="payment-info-box">
                <p style="margin:0 0 5px 0; font-size: 16px;">💵 Entry Fee: <strong id="fee-display" style="color:var(--neon-gold); font-size:20px;">₹0</strong></p>
                <p style="font-size:13px; color:#94a3b8; margin-bottom:10px;">Niche diye gaye UPI/QR par payment karke UTR/Txn ID copy karein.</p>
                
                <div id="qr-container"></div>
                <p style="margin: 5px 0; font-weight:bold;">UPI ID: <span id="upi-display" style="color:var(--pitch-green);"></span></p>
                
                <a id="pay-link" href="#" class="pay-btn-link" target="_blank">Pay Directly via UPI App 📱</a>
            </div>

            <div class="form-group">
                <label>Aapka Full Name:</label>
                <input type="text" id="username" required placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>WhatsApp Number (For Prize Transfer):</label>
                <input type="text" id="phone" required placeholder="Enter WhatsApp Number">
            </div>
            <div class="form-group">
                <label>Payment Transaction ID / UTR Number (Exact 12 Digits):</label>
                <input type="text" id="txnid" maxlength="12" required placeholder="Ex: 348912345678">
            </div>
            <button type="button" onclick="startPrediction()">Start Live Predictions 🚀</button>
        </div>

        <div id="section2" class="section">
            <h3 style="color:var(--pitch-green)">Section 2: Match Predictions</h3>
            
            <div class="form-group quiz-q" id="qBox1">
                <label id="label-q1"></label>
                <div class="options-grid" id="options-q1"></div>
            </div>

            <div class="form-group quiz-q" id="qBox2" style="display:none;">
                <label id="label-q2"></label>
                <div class="options-grid" id="options-q2"></div>
            </div>

            <div class="form-group quiz-q" id="qBox3" style="display:none;">
                <label id="label-q3"></label>
                <input type="text" id="q3" placeholder="Apna javab likhein (Answer here)">
            </div>

            <div class="form-group quiz-q" id="qBox4" style="display:none;">
                <label id="label-q4"></label>
                <div class="options-grid" id="options-q4"></div>
            </div>

            <div class="form-group quiz-q" id="qBox5" style="display:none;">
                <label id="label-q5"></label>
                <div class="options-grid" id="options-q5"></div>
            </div>

            <div class="form-group quiz-q" id="qBox6" style="display:none;">
                <label id="label-q6"></label>
                <input type="text" id="q6" placeholder="Player ka naam likhein">
            </div>

            <div class="form-group quiz-q" id="qBox7" style="display:none;">
                <label id="label-q7"></label>
                <div class="options-grid" id="options-q7"></div>
            </div>

            <button type="button" id="nextBtn" onclick="nextQuestion()">Next Question ➡️</button>
        </div>
    </form>
</div>

<button class="admin-btn" onclick="toggleContest()">Admin: Close/Open Contest Manually</button>

<script>
    // ==========================================
    // ⚙️ APP CONFIGURATION PANEL (SAB KUCH YAHAN SE CONTROL KAREIN)
    // ==========================================
    const APP_CONFIG = {
        // 🚀 Google Sheet Apps Script URL
        scriptUrl: "https://script.google.com/macros/s/AKfycbz0oyCqTgsQr7b0yoCi0A7boK4aPfBMyLgI7QmkcTtRNtBXv5JYuRYUEoZuPROfEx9W/exec",
        
        // 🛑 Quiz Contest Status (true = Chalu, false = Band)
        isContestLive: true,
        
        // ⏱️ Har question ka countdown timer (seconds mein)
        timerDuration: 10, 

        // 💵 ENTRY FEE & PAYMENT CONFIGURATION
        entryFee: "15",              // Yahan aap "10", "15", ya "100" jo chahein likhein
        upiId: "priyesh620@axl",     // Aapka asli UPI ID jahan paise chahiye
        qrImageUrl: "upi://pay?pa=YOUR_UPI_ID@okaxis&pn=FinGenius&am=15.00&cu=INR&tn=Contest_Entry",              // (Optional) Agar PhonePe QR ka image URL hai toh yahan paste karein

        // 📝 Sawaal aur Options (Hindi/English)
        questions: {
            q1: {
                text: "Q1: Aaj ka match kaunsi team jeetegi?",
                options: ["Team A", "Team B"]
            },
            q2: {
                text: "Q2: Kya aaj koi batsman century (100) banayega?",
                options: ["YES (Haan)", "NO (Nahi)"]
            },
            q3: {
                text: "Q3: Powerplay (Pehle 6 overs) mein kitne runs banenge? (Exact ya closest)"
            },
            q4: {
                text: "Q4: Match mein sabse zyada wickets kaun lega?",
                options: ["Spinners", "Fast Bowlers"]
            },
            q5: {
                text: "Q5: Kya 1st over mein wicket girega?",
                options: ["YES", "NO"]
            },
            q6: {
                text: "Q6: Is match ka 'Man of the Match' player kaun hoga?"
            },
            q7: {
                text: "Q7: Aaj total kitne Sixes (6s) lagenge?",
                options: ["10 se kam", "10 se 15 ke beech", "15 se zyada"]
            }
        }
    };
    // ==========================================

    let currentQ = 1;
    let timer;
    let timeLeft = APP_CONFIG.timerDuration;
    let isContestLive = APP_CONFIG.isContestLive;
    let answersData = {};

    window.onload = function() {
        document.getElementById('contest-status').innerText = isContestLive ? "LIVE" : "CLOSED";
        document.getElementById('contest-status').style.color = isContestLive ? "#10b981" : "#ef4444";
        document.getElementById('q-timer').innerText = APP_CONFIG.timerDuration + "s";
        
        // Dynamic Payment Setup
        document.getElementById('fee-display').innerText = "₹" + APP_CONFIG.entryFee;
        document.getElementById('upi-display').innerText = APP_CONFIG.upiId;
        
        // Dynamic Deep-linking for Mobile Users (Intent Pay)
        let deepLink = `upi://pay?pa=${APP_CONFIG.upiId}&pn=Only4CricketFans&am=${APP_CONFIG.entryFee}&cu=INR`;
        document.getElementById('pay-link').href = deepLink;

        // Show QR image if provided
        if(APP_CONFIG.qrImageUrl !== "") {
            document.getElementById('qr-container').innerHTML = `<img src="${APP_CONFIG.qrImageUrl}" class="qr-img" alt="Payment QR">`;
        }

        setupQuestionsUI();
    };

    function setupQuestionsUI() {
        for(let i=1; i<=7; i++) {
            let qData = APP_CONFIG.questions[`q${i}`];
            document.getElementById(`label-q${i}`).innerText = qData.text;
            if(qData.options) {
                let optionsHtml = "";
                qData.options.forEach(opt => {
                    optionsHtml += `<label class="radio-label"><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>`;
                });
                document.getElementById(`options-q${i}`).innerHTML = optionsHtml;
            }
        }
    }

    function startPrediction() {
        if(!isContestLive) {
            alert("Sorry! Yeh contest abhi closed hai.");
            return;
        }
        answersData.username = document.getElementById('username').value.trim();
        answersData.phone = document.getElementById('phone').value.trim();
        answersData.txnid = document.getElementById('txnid').value.trim();

        if(answersData.username == "" || answersData.phone == "" || answersData.txnid == "") {
            alert("Kripya poori details aur Payment ID bharein!");
            return;
        }

        // 🛡️ Live Fake Entry Validation Rule (12 Digits Validation)
        let txnRegex = /^\d{12}$/; 
        if(!txnRegex.test(answersData.txnid)) {
            alert("❌ Galat Transaction ID! Kripya bank se aaya hua exact 12-digit ka UTR/Txn Number hi dalein.");
            return;
        }

        document.getElementById('section1').classList.remove('active');
        document.getElementById('section2').classList.add('active');
        startTimer();
    }

    function startTimer() {
        timeLeft = APP_CONFIG.timerDuration;
        document.getElementById('q-timer').innerText = timeLeft + "s";
        clearInterval(timer);
        
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('q-timer').innerText = timeLeft + "s";
            
            if(timeLeft <= 0) {
                clearInterval(timer);
                nextQuestion();
            }
        }, 1000);
    }

    function saveCurrentAnswer() {
        if ([1, 2, 4, 5, 7].includes(currentQ)) {
            let selected = document.querySelector(`input[name="q${currentQ}"]:checked`);
            answersData[`q${currentQ}`] = selected ? selected.value : "No Answer";
        } else if ([3, 6].includes(currentQ)) {
            let typed = document.getElementById(`q${currentQ}`).value.trim();
            answersData[`q${currentQ}`] = typed ? typed : "No Answer";
        }
    }

    function nextQuestion() {
        saveCurrentAnswer();
        document.getElementById(`qBox${currentQ}`).style.display = 'none';
        currentQ++;

        if(currentQ <= 7) {
            document.getElementById(`qBox${currentQ}`).style.display = 'block';
            if(currentQ === 7) {
                document.getElementById('nextBtn').innerText = "Submit Predictions 🏆";
            }
            startTimer();
        } else {
            clearInterval(timer);
            document.getElementById('q-timer').innerText = "Submitting...";
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('nextBtn').innerText = "Please Wait...";
            
            fetch(APP_CONFIG.scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(answersData)
            }).then(() => {
                alert("Thank you! Aapke prediction live Google Sheet mein save ho gaye hain.");
                location.reload();
            }).catch(err => {
                alert("Data submit karne mein koi issue aaya!");
                console.error(err);
            });
        }
    }

    function toggleContest() {
        isContestLive = !isContestLive;
        document.getElementById('contest-status').innerText = isContestLive ? "LIVE" : "CLOSED";
        document.getElementById('contest-status').style.color = isContestLive ? "#10b981" : "#ef4444";
        alert("Contest status changed to: " + (isContestLive ? "LIVE" : "CLOSED"));
    }
</script>

</body>
</html>
